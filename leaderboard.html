<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Leaderboard - Quiz Arena</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">
  <h1>🏆 Leaderboard</h1>
  
  <div class="leaderboard-nav">
    <button class="category-btn active" onclick="showLeaderboard('all')">All Categories</button>
    <button class="category-btn" onclick="showLeaderboard('Sports')">Sports</button>
    <button class="category-btn" onclick="showLeaderboard('Entertainment')">Entertainment</button>
    <button class="category-btn" onclick="showLeaderboard('Knowledge')">Knowledge</button>
  </div>

  <div class="leaderboard-container">
    <div class="leaderboard-header">
      <span>Rank</span>
      <span>Player</span>
      <span>Category</span>
      <span>Score</span>
      <span>Date</span>
    </div>
    <div id="leaderboardList" class="leaderboard-list">
      <!-- Leaderboard entries will be inserted here -->
    </div>
  </div>

  <div class="nav-buttons">
    <button class="back-btn" onclick="window.location.href='index.html'">← Back to Home</button>
    <button id="logoutBtn" class="logout-btn" onclick="logout()">Logout</button>
  </div>

  <div class="footer">
    <h3>Quiz Arena</h3>
    <p>Test your knowledge across various categories</p>
  </div>
</div>

<script src="auth.js"></script>
<script src="leaderboard.js"></script>
</body>
</html>
