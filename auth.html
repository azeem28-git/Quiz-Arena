<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Login / Signup - Quiz Arena</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">
  <h1>Quiz Arena</h1>
  
  <div class="auth-container">
    <div class="auth-tabs">
      <button class="auth-tab active" onclick="showLogin()">Login</button>
      <button class="auth-tab" onclick="showSignup()">Signup</button>
    </div>

    <!-- Login Form -->
    <div id="loginForm" class="auth-form">
      <h2>Welcome Back!</h2>
      <form onsubmit="handleLogin(event)">
        <div class="form-group">
          <label>Username</label>
          <input type="text" id="loginUsername" required>
        </div>
        <div class="form-group">
          <label>Password</label>
          <input type="password" id="loginPassword" required>
        </div>
        <button type="submit" class="auth-btn">Login</button>
      </form>
      <p class="auth-message" id="loginMessage"></p>
    </div>

    <!-- Signup Form -->
    <div id="signupForm" class="auth-form" style="display: none;">
      <h2>Create Account</h2>
      <form onsubmit="handleSignup(event)">
        <div class="form-group">
          <label>Username</label>
          <input type="text" id="signupUsername" required>
        </div>
        <div class="form-group">
          <label>Email</label>
          <input type="email" id="signupEmail" required>
        </div>
        <div class="form-group">
          <label>Password</label>
          <input type="password" id="signupPassword" required>
        </div>
        <div class="form-group">
          <label>Confirm Password</label>
          <input type="password" id="confirmPassword" required>
        </div>
        <button type="submit" class="auth-btn">Signup</button>
      </form>
      <p class="auth-message" id="signupMessage"></p>
    </div>
  </div>

  <div class="footer">
    <h3>Quiz Arena</h3>
    <p>Test your knowledge across various categories</p>
  </div>
</div>

<script src="auth.js"></script>
</body>
</html>
